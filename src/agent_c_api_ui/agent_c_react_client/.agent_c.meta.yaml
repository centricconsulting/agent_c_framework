          \           if handler:\n               payload = await handler(event)\n\
          \               if payload:\n                   await self.redis_stream_manager.publish_event(\n\
          \                       event_type=event_type,\n                       event_data=payload,\n\
          \                       stream_id=stream_id,\n                       source=\"\
          AgentBridge\"\n                   )\n       except Exception as e:\n   \
          \        self.logger.error(f\"Failed to publish event to Redis Stream: {e}\"\
          )\n   ```\n\n5. Maintained the same JSON payload format for compatibility\
          \ with the frontend\n\nThe implementation ensures proper event handling\
          \ and ordering while adding Redis Streams support, maintaining backward\
          \ compatibility with the existing async queue mechanism."
