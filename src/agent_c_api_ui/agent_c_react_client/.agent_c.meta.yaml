        context: 'Create a new class that will handle:


          - Redis connection management

          - Stream creation and management

          - Publishing events to streams

          - Consuming events from streams

          - Error handling and reconnection logic

          - Stream cleanup



          This class should provide a clean API that can be used by both the BaseAgent
          and AgentBridge classes.


          ## Implementation Details


          Implemented a comprehensive RedisStreamManager class with the following
          features:


          - Stream Key Management with hierarchical naming convention (`agent_c:stream:{session_id}:{interaction_id}`)

          - Connection Management with separate pools for publishers and consumers

          - Event Serialization with standardized message format and metadata

          - Multi-level Error Handling with circuit breaker pattern and fallback mechanisms

          - Stream Lifecycle Management with automated creation, TTL management, and
          cleanup

          - Performance Optimization with connection pooling and batching support


          The class provides a complete API for Redis Streams operations, including:

          - publish_event() - For publishing events to Redis Streams

          - consume_events() - For consuming events from Redis Streams

          - create_stream() - For stream creation and initialization

          - close_stream() - For proper stream finalization


          The implementation follows the architectural design and provides robust
          error handling and fallback mechanisms.'
