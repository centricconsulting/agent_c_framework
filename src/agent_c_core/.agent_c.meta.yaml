        context: "Design a comprehensive Redis health monitoring system with circuit\
          \ breaker pattern to ensure reliable operation. The system should:\n\n1.\
          \ **Monitor Redis Health**:\n   - Perform periodic connection checks with\
          \ configurable intervals\n   - Measure operation latency and success rates\n\
          \   - Detect degraded performance conditions\n   - Identify specific failure\
          \ modes (connection refused, timeout, etc.)\n\n2. **Implement Circuit Breaker\
          \ Pattern**:\n   - Track failure rates with exponential decay\n   - Define\
          \ clear thresholds for circuit open/closed states\n   - Implement half-open\
          \ state for recovery testing\n   - Include jitter in retry attempts to prevent\
          \ thundering herd\n\n3. **Auto Recovery**:\n   - Implement graceful degradation\
          \ to async queue when Redis fails\n   - Attempt periodic recovery of Redis\
          \ connection\n   - Provide metrics on failover duration and frequency\n\
          \   - Log detailed diagnostics for troubleshooting\n\n4. **Notification\
          \ System**:\n   - Emit health status events for monitoring\n   - Provide\
          \ webhook capabilities for alerting\n   - Include detailed diagnostics in\
          \ notifications\n   - Allow customizable severity levels\n\nThe design should\
          \ minimize performance overhead during normal operation while providing\
          \ robust protection against Redis failures.\n\nDeliverables:\n- Health monitoring\
          \ class design\n- Circuit breaker state machine diagram\n- Recovery mechanism\
          \ flowchart\n- Interface for health status reporting\n- Integration points\
          \ with EventHandlerService"
