_plans:
  .scratch/redis_streams_exclusive_mode_plan:
    created_at: '2025-06-11T13:05:35.750325'
    description: Implement exclusive Redis Streams mode to eliminate duplicate event
      processing through async queue. Currently, the system is using both Redis Streams
      and async queue for event processing, causing potential duplicates and performance
      issues. This plan will ensure only Redis streams are used when that mode is
      enabled.
    id: a24b6fb2-f125-45f8-a78a-07711b8d7325
    lessons_learned: []
    tasks:
      01d601f1-ba1f-42b0-9cfb-dc91b5cb5eda:
        child_tasks: []
        completed: false
        context: 'We need to provide clear documentation on how to use environment
          variables to enable exclusive Redis Streams mode. This should include:


          1. The specific environment variables to set

          2. Their possible values and what each value means

          3. How these settings affect the behavior of the system

          4. Any potential side effects or considerations when using this mode'
        created_at: '2025-06-11T13:06:08.503269'
        description: Create a document explaining how to configure Redis Streams exclusive
          mode via environment variables
        id: 01d601f1-ba1f-42b0-9cfb-dc91b5cb5eda
        parent_id: null
        priority: medium
        sequence: 2
        title: Create environment variable configuration example
        updated_at: '2025-06-11T13:06:08.503269'
      3ce29be4-cd7e-4f79-a15f-97f9051f6246:
        child_tasks: []
        completed: false
        context: "The BaseAgent class in base.py needs to be modified to properly\
          \ handle the exclusive_callback_via_redis flag. This includes:\n\n1. Ensuring\
          \ the flag is properly read from the Redis configuration\n2. Making sure\
          \ the mode is properly set during initialization\n3. Adding clear logging\
          \ to show when exclusive mode is enabled\n4. Testing that the _raise_event\
          \ method correctly handles the exclusive mode flag\n\nCurrently, the _raise_event\
          \ method has this logic:\n```python\nredis_exclusive_mode = (self.redis_config\
          \ and getattr(self.redis_config, 'exclusive_callback_via_redis', False))\n\
          if callback is not None and (\n    not self.event_handler_mode_manager or\
          \ \n    self.event_handler_mode_manager.get_current_mode() != HandlerMode.REDIS\
          \ or\n    not redis_exclusive_mode\n):\n    try:\n        await callback(event)\n\
          ```\n\nWe need to ensure this logic works correctly when exclusive mode\
          \ is enabled."
        created_at: '2025-06-11T13:06:22.551991'
        description: Update the BaseAgent class initialization to ensure proper handling
          of the exclusive_callback_via_redis flag
        id: 3ce29be4-cd7e-4f79-a15f-97f9051f6246
        parent_id: null
        priority: high
        sequence: 3
        title: Modify BaseAgent initialization to support exclusive mode
        updated_at: '2025-06-11T13:06:22.551991'
      47973e72-08bf-42d0-8ac2-faeb2d320c47:
        child_tasks: []
        completed: false
        context: "The AgentBridge class in agent_bridge.py needs to be updated to\
          \ properly respect the exclusive mode settings. This includes:\n\n1. Ensuring\
          \ it properly initializes the Redis configuration with the correct mode\n\
          2. Modifying the consolidated_streaming_callback method to respect the exclusive\
          \ mode\n3. Making sure the consumption strategies properly handle REDIS_ONLY\
          \ mode\n\nCurrently, the consolidated_streaming_callback method has this\
          \ logic:\n```python\nshould_use_async_queue = (\n    current_mode != OperationMode.REDIS_ONLY\
          \ or not should_use_redis\n)\n\nif payload is not None and hasattr(self,\
          \ \"_stream_queue\") and should_use_async_queue:\n    await self._stream_queue.put(payload)\n\
          ```\n\nWe need to ensure this logic works correctly when in REDIS_ONLY mode."
        created_at: '2025-06-11T13:06:37.236123'
        description: Modify the AgentBridge class to respect the exclusive mode settings
          and avoid using the async queue when in REDIS_ONLY mode
        id: 47973e72-08bf-42d0-8ac2-faeb2d320c47
        parent_id: null
        priority: high
        sequence: 4
        title: Update AgentBridge to respect exclusive mode
        updated_at: '2025-06-11T13:06:37.236123'
